instances:
  - url: https://nemo-molt.docs.buildwithfern.com/nemo/molt
    custom-domain: docs.nvidia.com/nemo/molt
    multi-source: true

title: Molt

global-theme: nvidia

metadata:
  canonical-host: "docs.nvidia.com/nemo/molt"

libraries:
  molt:
    input:
      git: https://github.com/NVIDIA-NeMo/labs-molt
      subpath: molt
    output:
      path: ./product-docs/molt/Full-Library-Reference
    lang: python
  molt-local:
    input:
      path: ../..
    output:
      path: ./product-docs/molt/Full-Library-Reference
    lang: python

versions:
  - display-name: Nightly
    slug: nightly
    path: ./versions/nightly.yml
    availability: beta

redirects:
  - source: "/nemo/molt/index.html"
    destination: "/nemo/molt/nightly"
  - source: "/nemo/molt/nightly/index.html"
    destination: "/nemo/molt/nightly"

logo:
  href: /nemo/molt
  right-text: Molt

navbar-links:
  - type: github
    value: https://github.com/NVIDIA-NeMo/labs-molt

experimental:
  basepath-aware: true
