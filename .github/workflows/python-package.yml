name: Python package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    # publish only from the canonical repo, never from forks
    if: ${{ github.repository == 'NVIDIA-NeMo/labs-molt' }}
    name: build wheel
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        # setup.py tags one impure cp3XX wheel per interpreter
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel packaging

    - name: Build package
      run: python setup.py bdist_wheel --dist-dir=dist
      env:
        MOLT_PYPI_BUILD: "1"

    - uses: actions/upload-artifact@v4
      with:
        name: wheel-${{ matrix.python-version }}
        path: dist/*.whl

  publish:
    # PyPI Trusted Publishing (OIDC): the id-token permission replaces any API token,
    # and one publish job avoids the parallel first-upload race on a new project.
    name: upload to PyPI
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheel-*
        merge-multiple: true
        path: dist

    - uses: pypa/gh-action-pypi-publish@release/v1
