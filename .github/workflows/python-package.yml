name: Python package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    # publish only from the canonical repo, never from forks
    if: ${{ github.repository == 'NVIDIA-NeMo/labs-molt' }}
    name: build wheel and upload
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        # setup.py tags one impure cp3XX wheel per interpreter
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine packaging

    - name: Build package
      run: python setup.py bdist_wheel --dist-dir=dist
      env:
        MOLT_PYPI_BUILD: "1"

    - name: Publish package
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: python -m twine upload dist/*
