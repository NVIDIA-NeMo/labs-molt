name: CICD Molt

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
      - "deploy-release/*"
  workflow_dispatch:
    inputs:
      test_suite:
        description: Test suite to run.
        required: false
        type: choice
        options:
          - all
          - unit-only
        default: all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: read
  statuses: write

env:
  CI_IMAGE: ${{ vars.CONTAINER_REGISTRY || '766267172432.dkr.ecr.us-east-1.amazonaws.com' }}/rl:molt-${{ github.sha }}
  CI_REGISTRY: ${{ vars.CONTAINER_REGISTRY || '766267172432.dkr.ecr.us-east-1.amazonaws.com' }}
  CI_IMAGE_NAME: rl
  RUN_LINT_CHECK: ${{ vars.RUN_LINT_CHECK || 'false' }}
  UPLOAD_CODECOV: ${{ vars.UPLOAD_CODECOV || 'false' }}

jobs:
  pre-flight:
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_cicd_preflight.yml@v0.80.1
    with:
      default_runner_prefix: ${{ vars.DEFAULT_RUNNER_PREFIX }}
      non_nvidia_runner_prefix: ${{ vars.NON_NVIDIA_RUNNER_PREFIX }}
      default_test_data_path: ${{ vars.DEFAULT_TEST_DATA_PATH }}
      non_nvidia_test_data_path: ${{ vars.NON_NVIDIA_TEST_DATA_PATH }}
      sso_users_filename: ${{ vars.SSO_USERS_FILENAME }}
    secrets:
      NVIDIA_MANAGEMENT_ORG_PAT: ${{ secrets.NVIDIA_MANAGEMENT_ORG_PAT }}

  lint-check:
    name: Lint check
    runs-on: ubuntu-latest
    needs: [pre-flight]
    if: |
      needs.pre-flight.outputs.is_deployment_workflow != 'true'
      && (vars.RUN_LINT_CHECK || 'false') == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Run pre-commit
        run: |
          pip install pre-commit==3.6.0
          pre-commit install
          pre-commit run --all-files --show-diff-on-failure --color=always

  cicd-wait-in-queue:
    needs: [pre-flight, lint-check]
    runs-on: ubuntu-latest
    environment: test
    if: |
      always()
      && !cancelled()
      && !(needs.lint-check.result == 'failure'
      || needs.lint-check.result == 'cancelled')
      && !(needs.pre-flight.outputs.is_ci_workload == 'true'
      || needs.pre-flight.outputs.is_deployment_workflow == 'true'
      || needs.pre-flight.outputs.docs_only == 'true')
    steps:
      - name: Running CI tests
        run: |
          echo "Running CI tests"

  build-image:
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}
    needs: [pre-flight, lint-check, cicd-wait-in-queue]
    if: |
      always()
      && !cancelled()
      && !(needs.lint-check.result == 'failure'
      || needs.lint-check.result == 'cancelled')
      && (needs.cicd-wait-in-queue.result == 'success'
      || needs.pre-flight.outputs.is_ci_workload == 'true')
      && !(needs.pre-flight.outputs.docs_only == 'true'
      || needs.pre-flight.outputs.is_deployment_workflow == 'true')
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Get recently merged PR cache refs
        id: recent-pr-cache-refs
        uses: actions/github-script@v8
        env:
          REGISTRY: ${{ env.CI_REGISTRY }}
          IMAGE_NAME: ${{ env.CI_IMAGE_NAME }}
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const result = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  pullRequests(states: MERGED, first: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
                    nodes {
                      number
                    }
                  }
                }
              }
            `, { owner, repo });

            const refs = result.repository.pullRequests.nodes
              .map(({ number }) => `type=registry,ref=${process.env.REGISTRY}/${process.env.IMAGE_NAME}:molt-pr-${number}-buildcache,mode=max`)
              .join("\n");

            core.setOutput("cache-from", refs);
            core.info(`Found ${result.repository.pullRequests.nodes.length} recently merged PR cache refs.`);
      - name: Compute build metadata
        id: build-meta
        env:
          REGISTRY: ${{ env.CI_REGISTRY }}
          IMAGE_NAME: ${{ env.CI_IMAGE_NAME }}
          RUN_ID: ${{ github.run_id }}
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          PR_NUMBER=""
          if [[ "$GH_REF" =~ refs/heads/pull-request/([0-9]+) ]]; then
            PR_NUMBER="${BASH_REMATCH[1]}"
          fi

          TAGS=(
            "${{ env.CI_IMAGE }}"
            "$REGISTRY/$IMAGE_NAME:molt-$RUN_ID"
          )
          if [[ "$GH_REF" == "refs/heads/main" ]]; then
            CACHE_KEY="main"
            TAGS+=("$REGISTRY/$IMAGE_NAME:molt-main")
          elif [[ -n "$PR_NUMBER" ]]; then
            CACHE_KEY="pr-$PR_NUMBER"
            TAGS+=("$REGISTRY/$IMAGE_NAME:molt-pr-$PR_NUMBER")
          else
            CACHE_KEY=$(printf '%s' "${GH_REF_NAME:-$RUN_ID}" | tr '/' '-' | tr -cd '[:alnum:]._-')
            if [[ -z "$CACHE_KEY" ]]; then
              CACHE_KEY="$RUN_ID"
            fi
          fi

          CACHE_FROM=(
            "type=registry,ref=$REGISTRY/$IMAGE_NAME:molt-main-buildcache,mode=max"
          )
          if [[ "$CACHE_KEY" != "main" ]]; then
            CACHE_FROM+=("type=registry,ref=$REGISTRY/$IMAGE_NAME:molt-$CACHE_KEY-buildcache,mode=max")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
            echo "cache-from<<EOF"
            printf '%s\n' "${CACHE_FROM[@]}"
            echo "EOF"
            echo "cache-to=type=registry,ref=$REGISTRY/$IMAGE_NAME:molt-$CACHE_KEY-buildcache,mode=max"
          } >> "$GITHUB_OUTPUT"
      - name: Build CI image
        uses: docker/build-push-action@v5
        with:
          file: dockerfile/Dockerfile
          context: .
          push: true
          cache-from: |
            ${{ steps.build-meta.outputs.cache-from }}
            ${{ steps.recent-pr-cache-refs.outputs.cache-from }}
          cache-to: ${{ steps.build-meta.outputs.cache-to }}
          no-cache: false
          tags: |
            ${{ steps.build-meta.outputs.tags }}

  unit-tests:
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}
    needs: [pre-flight, cicd-wait-in-queue, build-image]
    if: |
      !cancelled()
      && needs.pre-flight.result == 'success'
      && (needs.cicd-wait-in-queue.result == 'success'
      || needs.pre-flight.outputs.is_ci_workload == 'true')
      && needs.build-image.result == 'success'
      && !(needs.pre-flight.outputs.docs_only == 'true'
      || needs.pre-flight.outputs.is_deployment_workflow == 'true')
      && (github.event_name != 'workflow_dispatch'
      || inputs.test_suite == 'all'
      || inputs.test_suite == 'unit-only')
    steps:
      - uses: actions/checkout@v6
      - name: Run unit tests
        uses: ./.github/actions/test-template
        with:
          image: ${{ env.CI_IMAGE }}
          script: Launch_Unit_Tests
          script-dir: tests/unit/launch_scripts
          timeout: "60"
          coverage-prefix: unit-test

  Nemo_CICD_Test:
    needs:
      - pre-flight
      - cicd-wait-in-queue
      - build-image
      - unit-tests
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Get workflow result
        id: result
        shell: bash -e -u -o pipefail {0}
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECT_TESTS: ${{ needs.pre-flight.outputs.docs_only != 'true' && needs.pre-flight.outputs.is_deployment_workflow != 'true' }}
          EXPECT_UNIT: ${{ github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'unit-only' }}
        run: |
          FAILED_JOBS=$(gh run view "$GITHUB_RUN_ID" --json jobs --jq \
            '[.jobs[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped")] | length') || FAILED_JOBS=0

          UNEXPECTED_SKIPS=0
          check_required_job() {
            local job_name="$1"
            local expect="$2"
            [ "$expect" != "true" ] && return

            local conclusion
            conclusion=$(gh run view "$GITHUB_RUN_ID" --json jobs --jq \
              --arg name "$job_name" \
              '[.jobs[] | select(.name == $name)] | first | .conclusion // ""') || conclusion=""

            if [ "$conclusion" = "skipped" ]; then
              echo "Found unexpectedly skipped job: $job_name"
              UNEXPECTED_SKIPS=$((UNEXPECTED_SKIPS + 1))
            fi
          }

          if [ "$EXPECT_TESTS" = "true" ]; then
            check_required_job "unit-tests" "$EXPECT_UNIT"
          fi

          if [ "${FAILED_JOBS:-0}" -gt 0 ]; then
            echo "Found $FAILED_JOBS failed job(s):"
            gh run view "$GITHUB_RUN_ID" --json jobs --jq \
              '.jobs[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped") | .name'
          fi

          if [ "${FAILED_JOBS:-0}" -gt 0 ] || [ "${UNEXPECTED_SKIPS:-0}" -gt 0 ]; then
            exit 1
          fi

          echo "All required CI jobs completed successfully"

  coverage-fake:
    name: Coverage Fake
    runs-on: ubuntu-latest
    needs: [pre-flight, lint-check, Nemo_CICD_Test]
    if: |
      always()
      && !cancelled()
      && (needs.pre-flight.outputs.docs_only == 'true'
      || needs.pre-flight.outputs.is_deployment_workflow == 'true')
    steps:
      - name: Generate fake coverage report
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'No code changes - coverage check skipped',
              context: 'codecov/patch'
            });

  coverage:
    runs-on: ubuntu-latest
    needs: [pre-flight, unit-tests, Nemo_CICD_Test]
    if: |
      always()
      && !cancelled()
      && needs.pre-flight.outputs.docs_only == 'false'
      && needs.pre-flight.outputs.is_deployment_workflow == 'false'
    steps:
      - uses: actions/checkout@v6
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-unit-test-*
          merge-multiple: false
      - name: Combine coverage
        id: combine-coverage
        run: |
          pip install coverage[toml]
          files=$(find . -name '.coverage*' -type f | tr '\n' ' ')
          if [ -z "$files" ]; then
            echo "No coverage files"
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          coverage combine --keep $files
          coverage report -i
          coverage xml -i -o coverage-unit-test.xml
          echo "has_coverage=true" >> "$GITHUB_OUTPUT"
      - name: Upload combined coverage artifact
        if: steps.combine-coverage.outputs.has_coverage == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-unit-test-${{ github.run_id }}
          path: coverage-unit-test.xml
          if-no-files-found: error
      - name: Upload to Codecov
        if: env.UPLOAD_CODECOV == 'true' && steps.combine-coverage.outputs.has_coverage == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit-test
          files: coverage-unit-test.xml
          fail_ci_if_error: false
