name: Test Template
description: Run a labs-molt CI script inside the local CI container image.

inputs:
  image:
    description: Docker image to run.
    required: true
  script:
    description: Script basename without .sh.
    required: true
  script-dir:
    description: Directory containing the script.
    required: true
  timeout:
    description: Max runtime in minutes.
    required: false
    default: "30"
  coverage-prefix:
    description: Coverage artifact prefix.
    required: false
    default: unit-test

runs:
  using: composite
  steps:
    - name: Run test script
      shell: bash
      run: |
        set -xeuo pipefail
        docker run --rm \
          --runtime=nvidia --gpus all \
          --shm-size=32g \
          --workdir /opt/labs-molt \
          --env COVERAGE_FILE=/opt/labs-molt/.coverage \
          --volume "${{ github.workspace }}:/opt/labs-molt" \
          "${{ inputs.image }}" \
          bash -lc 'cd /opt/labs-molt && timeout "$(( ${{ inputs.timeout }} * 60 ))s" bash "${{ inputs.script-dir }}/${{ inputs.script }}.sh"'

    - name: Generate coverage report
      shell: bash
      if: always()
      run: |
        set -xeuo pipefail
        docker run --rm \
          --runtime=nvidia --gpus all \
          --shm-size=32g \
          --workdir /opt/labs-molt \
          --env COVERAGE_FILE=/opt/labs-molt/.coverage \
          --volume "${{ github.workspace }}:/opt/labs-molt" \
          "${{ inputs.image }}" \
          bash -lc 'cd /opt/labs-molt && coverage combine || true; coverage report -i || true; coverage xml -i || true'

    - name: Upload coverage artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: coverage-${{ inputs.coverage-prefix }}-${{ inputs.script }}-${{ github.run_id }}
        path: |
          .coverage
          coverage.xml
        include-hidden-files: true
        if-no-files-found: ignore
