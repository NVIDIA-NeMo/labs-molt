name: Feature request
description: Propose a new capability or enhancement for Molt.
title: "[feature] "
labels:
  - feature
  - needs-triage
body:
  - type: textarea
    id: user-problem
    attributes:
      label: User problem
      description: What pain point or limitation are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome
      description: What should happen if this request is addressed?
    validations:
      required: true
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - area:speech
        - area:llm
        - area:evaluation
        - area:frontend
        - area:docs
        - area:ci
        - area:packaging
        - area:misc
        - unsure
    validations:
      required: true
  - type: textarea
    id: extra-context
    attributes:
      label: Extra context
