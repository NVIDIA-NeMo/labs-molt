name: Support request
description: Ask for help using Molt or understanding expected behavior.
title: "[support] "
labels:
  - support
  - needs-triage
body:
  - type: textarea
    id: user-problem
    attributes:
      label: User problem
      description: What are you trying to do, and where are you stuck?
    validations:
      required: true
  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome
      description: What answer, behavior, or guidance would unblock you?
    validations:
      required: true
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - area:speech
        - area:llm
        - area:evaluation
        - area:frontend
        - area:docs
        - area:ci
        - area:packaging
        - area:misc
        - unsure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
